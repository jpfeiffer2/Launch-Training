<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Day 3 Exam Records</title><style>
body{font-family:Arial,Helvetica,sans-serif;background:#eef2f5;margin:0;padding:24px;color:#111}.page{max-width:1000px;margin:0 auto;background:#fff;border-radius:18px;box-shadow:0 12px 40px rgba(0,0,0,.12);overflow:hidden}header{background:#111820;color:#fff;padding:26px 32px;border-top:10px solid #6cc24a}h1{margin:0}.content{padding:28px 32px}.record{display:grid;grid-template-columns:1.4fr 1fr auto;gap:16px;align-items:center;border:1px solid #dfe7ed;border-radius:14px;padding:16px;margin:12px 0;background:#f8fafc}.score{font-weight:900;color:#0b8f2a}.fail{color:#b42318}.btn{display:inline-block;border:0;border-radius:999px;padding:10px 14px;font-weight:900;text-decoration:none;background:#111820;color:#fff;margin-right:8px}button{border:0;border-radius:999px;padding:10px 14px;font-weight:900;cursor:pointer}.yellow{background:#f2e600;color:#111}.details{display:none;margin-top:12px;grid-column:1/-1;background:#fff;border-radius:12px;padding:14px}.missed{border-top:1px solid #dfe7ed;padding:10px 0}.empty{padding:20px;background:#f8fafc;border-radius:12px}</style></head><body><div class="page"><header><h1>Day 3 Exam Records</h1><p>Saved locally on this device.</p></header><div class="content"><a class="btn" href="index.html">Back to Day 3 Menu</a><a class="btn" href="../../../index.html">Training Portal</a><button class="yellow" onclick="render()">Refresh Records</button><div id="records"></div></div></div><script>
const storageKey='launch_cashier_day3_exam_records_v1';
function escapeHtml(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function formatDate(ts){try{return new Date(ts).toLocaleString()}catch(e){return ts||''}}
function getRecords(){try{return JSON.parse(localStorage.getItem(storageKey)||'[]')}catch(e){return []}}
function toggle(i){const el=document.getElementById('details-'+i);if(el)el.style.display=el.style.display==='block'?'none':'block'}
function printRecord(i){toggle(i);window.print()}
function render(){const records=getRecords();const root=document.getElementById('records');if(!records.length){root.innerHTML='<div class="empty">No saved Day 3 exam records yet.</div>';return;}root.innerHTML=records.map((r,i)=>`<div class="record"><div><strong>${escapeHtml(r.employee?.employeeName||'Unnamed Employee')}</strong><br><small>Submitted: ${escapeHtml(formatDate(r.submittedAt))}</small></div><div>Date: ${escapeHtml(r.employee?.quizDate||'')}<br>Trainer: ${escapeHtml(r.employee?.trainerName||'')}</div><div class="score ${r.passed?'':'fail'}">${r.passed?'PASS':'FAIL'}<br>${r.score}/${r.total} (${r.percent}%)<br><button onclick="toggle(${i})">View</button></div><div class="details" id="details-${i}"><h3>Missed Questions</h3>${r.missed&&r.missed.length?r.missed.map(m=>`<div class="missed"><strong>Q${m.id}:</strong> ${escapeHtml(m.text)}<br><strong>Selected:</strong> ${escapeHtml(m.selected||'Not recorded')}<br><strong>Correct:</strong> ${escapeHtml(m.correct)}</div>`).join(''):'<p>Perfect score — no missed questions.</p>'}</div></div>`).join('')}
render();
</script></body></html>
