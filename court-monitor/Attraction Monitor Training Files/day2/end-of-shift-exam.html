play:grid;gap:8px}.wrong{border-left:6px solid #dc2626;background:#fff7f7;padding:10px;border-radius:8px}@media(max-width:760px){.meta-grid{grid-template-columns:1fr}.header{display:block}}</style>  <style>

  <script>
    (() => {
      const storageKey = "launchTrainingUnlockedUntil";
      const unlockedUntil = Number(localStorage.getItem(storageKey) || 0);

      if (unlockedUntil <= Date.now()) {
        localStorage.removeItem(storageKey);

        const currentPath = window.location.pathname;
        const moduleMarker = "/court-monitor/";
        const modulePosition = currentPath.indexOf(moduleMarker);
        const portalBase = modulePosition >= 0
          ? currentPath.slice(0, modulePosition + 1)
          : "/";

        const returnPath =
          currentPath + window.location.search + window.location.hash;

        window.location.replace(
          portalBase + "?return=" + encodeURIComponent(returnPath)
        );
      } else {
        document.documentElement.classList.add("portal-authenticated");
      }
    })();
  </script>

</head><body><div class="page-shell"><div class="container"><div class="brand-topbar"></div><div class="header"><h1>Day 2 Attraction Monitor Training Exam</h1><p>Attraction Monitor Training · answers stay in fixed A/B/C/D order</p></div><div class="content"><div class="meta-card"><div class="meta-grid"><div class="field"><label>Employee Name</label><input id="employee" /></div><div class="field"><label>Trainer Name</label><input id="trainer" /></div><div class="field"><label>Park Location</label><input id="park" /></div></div></div><div class="toolbar"><div class="progress-box" id="progress">Question 1</div><div><a class="button dark2" href="./index.html">Back to Day Menu</a> <a class="button dark2" href="../../../index.html">Training Portal</a></div></div><form id="exam"></form><div class="actions"><button class="dark2" id="prev" type="button">Back</button><button class="primary" id="next" type="button">Next</button><button class="yellow" id="submit" type="button" style="display:none">Submit Exam</button></div><div class="result" id="result"></div></div></div></div><script>
const BANK=[["You need to use the restroom and no replacement has arrived. What should you do?", ["Radio for coverage and remain at your position until relieved", "Leave quickly and come right back", "Ask a guest to watch the area", "Close the attraction without telling anyone"], 0], ["Which behavior is NOT active monitoring?", ["Leaning against padding while talking to another employee", "Scanning the full court", "Walking your assigned area", "Checking wristbands and socks"], 0], ["A guest is sitting on a trampoline bed. What should you do?", ["Ask them to move off the trampoline and explain the safety reason", "Ignore it if they are tired", "Tell another guest to handle it", "Wait until the end of their jump time"], 0], ["What equipment should an Attraction Monitor have before taking position?", ["Whistle, working walkie, and First Aid bag", "Cell phone and water bottle", "Clipboard only", "Nothing if a manager is nearby"], 0], ["What should you do if a guest keeps ignoring rules after correction?", ["Call a Supervisor or Manager", "Argue until they listen", "Ignore them", "Let other guests correct them"], 0], ["What does a wristband help a monitor verify?", ["Guest eligibility and jump time", "Shoe size", "Food order number", "Birthday party room"], 0], ["Why is continuous movement important?", ["It improves visibility and shows the area is supervised", "It makes the shift go faster", "It lets you visit coworkers", "It avoids having to use the walkie"], 0], ["What is the best way to correct a guest?", ["Calmly state the rule and explain the safety reason", "Yell so everyone hears", "Embarrass them so they remember", "Do nothing unless they complain"], 0], ["What is the primary focus for all guests and associates?", ["Safety", "Speed", "Sales", "Noise control"], 0], ["Which is a common monitoring mistake?", ["Watching an injury instead of continuing to monitor your assigned area", "Checking footwear", "Using a whistle when needed", "Calling for help early"], 0], ["Which attractions receive full training in this program?", ["Main Court, Dodgeball, Ninja Course, and Launch Pad / Stunt Jump", "Every possible Launch attraction", "Only arcade and bowling", "Only attractions at the trainee\u2019s home park"], 0], ["What is a key Main Court rule?", ["One person per square", "Guests may sit wherever they want", "Larger guests always get priority", "Socks are optional"], 0], ["What should a monitor do if two jumpers are affecting each other\u2019s bounce?", ["Separate or redirect them before a collision occurs", "Wait to see if they fall", "Tell them to jump higher", "Ignore it if they are friends"], 0], ["Dodgeball gets heated and guests start arguing. What should the monitor do?", ["Pause play and reset expectations", "Let them work it out", "Join the argument", "Walk away from the court"], 0], ["Why does Ninja Course require spacing control?", ["Guests can collide, rush obstacles, or land unsafely", "It makes the line look shorter", "It prevents guests from asking questions", "It is only needed when managers are watching"], 0], ["What should guests remove before using the Ninja Course?", ["Loose jewelry, watches, phones, cameras, and loose items", "Launch socks", "Wristbands", "Shirts"], 0], ["What is critical on Launch Pad / Stunt Jump?", ["The landing area must be clear before the next guest jumps", "Guests may self-dispatch", "Two guests should jump together", "The monitor should stand far away"], 0], ["What should you do if a trampoline bed rips?", ["Safely clear the area and call management immediately", "Cover it with a towel", "Let small children use it only", "Wait until closing"], 0], ["Which issue requires management attention before opening?", ["Exposed metal or damaged padding", "A guest asking a question", "A long line at check-in", "A birthday party arriving early"], 0], ["For other attractions not covered in this training, what should employees do?", ["Follow posted rules, manufacturer guidance, and Supervisor direction", "Make up rules based on common sense only", "Ignore the attraction", "Train guests to monitor each other"], 0]];
function shuffle(a){let x=[...a];for(let i=x.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]]}return x}
const QUESTIONS=shuffle(BANK).slice(0,20);let idx=0;const answers={};const form=document.getElementById('exam'),progress=document.getElementById('progress');
function render(){const q=QUESTIONS[idx];progress.textContent=`Question ${idx+1} of ${QUESTIONS.length}`;form.innerHTML=`<div class="question-card"><div class="question-text">${idx+1}. ${q[0]}</div><div class="answers">${q[1].map((a,i)=>`<label class="answer"><input type="radio" name="q" value="${i}" ${answers[idx]===i?'checked':''}> <strong>${String.fromCharCode(65+i)}.</strong> <span>${a}</span></label>`).join('')}</div></div>`;form.querySelectorAll('input').forEach(inp=>inp.onchange=()=>answers[idx]=Number(inp.value));document.getElementById('prev').disabled=idx===0;document.getElementById('next').style.display=idx===QUESTIONS.length-1?'none':'inline-block';document.getElementById('submit').style.display=idx===QUESTIONS.length-1?'inline-block':'none'}
document.getElementById('prev').onclick=()=>{if(idx>0){idx--;render()}};document.getElementById('next').onclick=()=>{if(answers[idx]===undefined){alert('Please select an answer before continuing.');return}if(idx<QUESTIONS.length-1){idx++;render()}};
document.getElementById('submit').onclick=()=>{if(answers[idx]===undefined){alert('Please select an answer before submitting.');return}let correct=0,review=[];QUESTIONS.forEach((q,i)=>{if(answers[i]===q[2]) correct++; else review.push(`<div class="wrong"><strong>Question ${i+1}:</strong> ${q[0]}<br>Your answer: ${q[1][answers[i]]||'No answer'}<br>Correct answer: ${q[1][q[2]]}</div>`)});let score=Math.round(correct/QUESTIONS.length*100);let pass=score>=80;let rec={date:new Date().toLocaleString(),employee:employee.value,trainer:trainer.value,park:park.value,day:'day2',score,correct,total:QUESTIONS.length};let key='courtMonitorExamRecords';let records=JSON.parse(localStorage.getItem(key)||'[]');records.push(rec);localStorage.setItem(key,JSON.stringify(records));const r=document.getElementById('result');r.className='result '+(pass?'pass':'fail');r.style.display='block';r.innerHTML=`<h2>${pass?'PASS':'NEEDS REVIEW'} · ${score}%</h2><p>${correct} of ${QUESTIONS.length} correct. This result has been saved to local exam records on this computer.</p><div class="actions"><button onclick="window.print()" class="yellow">Print Result</button><a class="button dark2" href="./exam-records.html">View Exam Records</a></div><div class="review">${review.join('')}</div>`;window.scrollTo(0,document.body.scrollHeight)};render();
