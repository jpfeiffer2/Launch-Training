<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Final Attraction Monitor Training Exam</title><style>
:root{--g:#6cc24a;--gd:#4da62d;--y:#f2e600;--b:#0a0a0a;--w:#fff;--muted:#5b6570;--line:#e5eaee;--danger:#dc2626;--blue:#2563eb;--shadow:0 18px 50px rgba(0,0,0,.18);--radius:24px}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top left,rgba(108,194,74,.22),transparent 32%),linear-gradient(135deg,#070707,#171717 52%,#2d341f);color:#111}.btn,.button{border:0;border-radius:999px;padding:12px 18px;font-weight:900;text-decoration:none;display:inline-block;cursor:pointer}.dark{background:#101418;color:#f2e600}.yellow{background:var(--y);color:#000}.back{display:inline-block;color:#fff;text-decoration:none;margin-bottom:18px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);padding:10px 14px;border-radius:999px;font-weight:700}.strip{height:10px;background:linear-gradient(90deg,var(--g),var(--y))}.eyebrow{text-transform:uppercase;letter-spacing:2px;color:var(--gd);font-weight:900;font-size:.78rem}h1,h2,h3{margin:0;color:#101418}p{line-height:1.45}.logo-mark{width:54px;height:54px;border-radius:50%;background:#111;border:3px solid var(--g);display:grid;place-items:center;font-weight:900;color:var(--y);box-shadow:0 0 0 3px rgba(242,230,0,.16)}
body{background:linear-gradient(180deg,#f8fafb,#f2f5f7);color:#1f2328;line-height:1.5}.page-shell{max-width:1080px;margin:24px auto;padding:0 16px 40px}.container{background:#fff;border-radius:18px;box-shadow:0 8px 28px rgba(0,0,0,.08);overflow:hidden;border:1px solid var(--line)}.brand-topbar{height:10px;background:linear-gradient(90deg,var(--g),var(--y))}.header{padding:18px 24px;border-bottom:4px solid var(--y);display:flex;gap:16px;align-items:center}.header h1{font-size:1.35rem;white-space:nowrap}.header p{margin:0;color:#666}.content{padding:24px}.meta-card,.toolbar,.result,.question-card,.exam-note{border:1px solid var(--line);border-radius:14px;background:#fff}.meta-card{padding:18px;margin-bottom:18px}.exam-note{padding:14px 16px;background:#fafcfd;margin-bottom:18px;color:#374151}.exam-note strong{color:#101418}.meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.field label{display:block;font-weight:bold;margin-bottom:6px}.field input{width:100%;padding:11px;border:1px solid #cfd8df;border-radius:10px;font-size:1rem}.toolbar{padding:14px 16px;margin-bottom:18px;background:#fafcfd;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.progress-box{font-weight:bold;background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 12px}.source-pill{display:inline-block;margin-left:8px;background:#edf9ee;color:#1b5e20;border:1px solid #b7dfac;border-radius:999px;padding:6px 10px;font-size:.82rem;font-weight:900}.question-card{padding:18px;margin-bottom:18px}.question-text{font-size:1.13rem;font-weight:900;margin-bottom:14px}.answers{display:grid;gap:10px}.answer{border:1px solid #d7e0e7;border-radius:12px;padding:12px;cursor:pointer;display:flex;gap:10px;align-items:flex-start}.answer input{margin-top:3px}.answer:hover{border-color:var(--g);background:#f8fcf6}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}button,.button{border:0;border-radius:999px;padding:11px 18px;font-weight:900;cursor:pointer;text-decoration:none}.primary{background:var(--g);color:#071207}.yellow{background:var(--y);color:#000}.dark2{background:#111820;color:#fff}.result{padding:18px;margin-top:18px;display:none}.pass{background:#edf9ee;border-color:#89c997}.fail{background:#fff1f1;border-color:#e3a1a1}.review{margin-top:16px;display:grid;gap:8px}.wrong{border-left:6px solid #dc2626;background:#fff7f7;padding:10px;border-radius:8px}@media(max-width:760px){.meta-grid{grid-template-columns:1fr}.header{display:block}.header h1{white-space:normal}.source-pill{display:block;margin:8px 0 0;width:max-content}}</style>  <style>html{display:none}html.portal-authenticated{display:block}</style>
  <script>
    (() => {
      const storageKey = "launchTrainingUnlockedUntil";
      const unlockedUntil = Number(localStorage.getItem(storageKey) || 0);
      if (unlockedUntil <= Date.now()) {
        localStorage.removeItem(storageKey);
        const currentPath = window.location.pathname;
        const moduleMarker = "/court-monitor/";
        const modulePosition = currentPath.indexOf(moduleMarker);
        const portalBase = modulePosition >= 0 ? currentPath.slice(0, modulePosition + 1) : "/";
        const returnPath = currentPath + window.location.search + window.location.hash;
        window.location.replace(portalBase + "?return=" + encodeURIComponent(returnPath));
      } else { document.documentElement.classList.add("portal-authenticated"); }
    })();
  </script>

</head><body><div class="page-shell"><div class="container"><div class="brand-topbar"></div><div class="header"><h1>Final Attraction Monitor Training Exam</h1><p>50 randomized questions · randomized answer order</p></div><div class="content"><div class="exam-note"><strong>Exam build:</strong> 10 random Day 1 questions, 10 random Day 2 questions, and all 30 Day 3 questions. Questions and answers reshuffle each time the exam starts.</div><div class="meta-card"><div class="meta-grid"><div class="field"><label>Employee Name</label><input id="employee" /></div><div class="field"><label>Trainer Name</label><input id="trainer" /></div><div class="field"><label>Park Location</label><input id="park" /></div></div></div><div class="toolbar"><div class="progress-box" id="progress">Question 1</div><div><a class="button dark2" href="./index.html">Back to Day Menu</a><a class="button dark2" href="../../../index.html">Training Portal</a></div></div><form id="exam"></form><div class="actions"><button class="dark2" id="prev" type="button">Back</button><button class="primary" id="next" type="button">Next</button><button class="yellow" id="submit" type="button" style="display:none">Submit Exam</button></div><div class="result" id="result"></div></div></div></div>
<script src="../question-banks/day1-question-bank.js"></script>
<script src="../question-banks/day2-question-bank.js"></script>
<script src="../question-banks/day3-question-bank.js"></script>
<script>
function shuffle(a){let x=[...a];for(let i=x.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]]}return x}
function sample(arr,n){return shuffle(arr).slice(0,n)}
function normalizeQuestion(q,source){return{source:source,id:q.id||'',category:q.category||source,question:q.question,answers:[...q.answers],correct:q.correct}}
function randomizeAnswers(q){const opts=q.answers.map((text,index)=>({text,correct:index===q.correct}));const mixed=shuffle(opts);return{...q,answers:mixed.map(o=>o.text),correct:mixed.findIndex(o=>o.correct)}}
function buildQuestionSet(){const d1=(window.DAY1_QUESTION_BANK||[]).map(q=>normalizeQuestion(q,'Day 1'));const d2=(window.DAY2_QUESTION_BANK||[]).map(q=>normalizeQuestion(q,'Day 2'));const d3=(window.DAY3_QUESTION_BANK||[]).map(q=>normalizeQuestion(q,'Day 3'));if(d1.length<10||d2.length<10||d3.length<30){alert('Question bank error: final exam requires at least 10 Day 1 questions, 10 Day 2 questions, and 30 Day 3 questions.');}
  const selected=[...sample(d1,10),...sample(d2,10),...d3];return shuffle(selected.map(randomizeAnswers));}
function escapeHtml(value){return String(value).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
const QUESTIONS=buildQuestionSet();let idx=0;const answers={};const form=document.getElementById('exam'),progress=document.getElementById('progress');
function render(){const q=QUESTIONS[idx];progress.innerHTML=`Question ${idx+1} of ${QUESTIONS.length}<span class="source-pill">${escapeHtml(q.source)}</span>`;form.innerHTML=`<div class="question-card"><div class="question-text">${idx+1}. ${escapeHtml(q.question)}</div><div class="answers">${q.answers.map((a,i)=>`<label class="answer"><input type="radio" name="q" value="${i}" ${answers[idx]===i?'checked':''}> <strong>${String.fromCharCode(65+i)}.</strong> <span>${escapeHtml(a)}</span></label>`).join('')}</div></div>`;form.querySelectorAll('input').forEach(inp=>inp.onchange=()=>answers[idx]=Number(inp.value));document.getElementById('prev').disabled=idx===0;document.getElementById('next').style.display=idx===QUESTIONS.length-1?'none':'inline-block';document.getElementById('submit').style.display=idx===QUESTIONS.length-1?'inline-block':'none'}
document.getElementById('prev').onclick=()=>{if(idx>0){idx--;render()}};document.getElementById('next').onclick=()=>{if(answers[idx]===undefined){alert('Please select an answer before continuing.');return}if(idx<QUESTIONS.length-1){idx++;render()}};
document.getElementById('submit').onclick=()=>{if(answers[idx]===undefined){alert('Please select an answer before submitting.');return}let correct=0,review=[];QUESTIONS.forEach((q,i)=>{if(answers[i]===q.correct) correct++; else review.push(`<div class="wrong"><strong>Question ${i+1} (${escapeHtml(q.source)}):</strong> ${escapeHtml(q.question)}<br>Your answer: ${escapeHtml(q.answers[answers[i]]||'No answer')}<br>Correct answer: ${escapeHtml(q.answers[q.correct])}</div>`)});let score=Math.round(correct/QUESTIONS.length*100);let pass=score>=80;let rec={date:new Date().toLocaleString(),employee:employee.value,trainer:trainer.value,park:park.value,day:'final',score,correct,total:QUESTIONS.length};let key='courtMonitorExamRecords';let records=JSON.parse(localStorage.getItem(key)||'[]');records.push(rec);localStorage.setItem(key,JSON.stringify(records));const r=document.getElementById('result');r.className='result '+(pass?'pass':'fail');r.style.display='block';r.innerHTML=`<h2>${pass?'PASS':'NEEDS REVIEW'} · ${score}%</h2><p>${correct} of ${QUESTIONS.length} correct. This result has been saved to local exam records on this computer.</p><div class="actions"><button onclick="window.print()" class="yellow">Print Result</button><a class="button dark2" href="./exam-records.html">View Exam Records</a></div><div class="review">${review.join('')}</div>`;window.scrollTo(0,document.body.scrollHeight)};render();
</script></body></html>
