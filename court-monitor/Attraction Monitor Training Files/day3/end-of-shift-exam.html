</head><body><div class="page-shell"><div class="container"><div class="brand-topbar"></div><div class="header"><h1>Day 3 Attraction Monitor Training Exam</h1><p>Attraction Monitor Training · answers stay in fixed A/B/C/D order</p></div><div class="content"><div class="meta-card"><div class="meta-grid"><div class="field"><label>Employee Name</label><input id="employee" /></div><div class="field"><label>Trainer Name</label><input id="trainer" /></div><div class="field"><label>Park Location</label><input id="park" /></div></div></div><div class="toolbar"><div class="progress-box" id="progress">Question 1</div><div><a class="button dark2" href="./index.html">Back to Day Menu</a> <a class="button dark2" href="../../../index.html">Training Portal</a></div></div><form id="exam"></form><div class="actions"><button class="dark2" id="prev" type="button">Back</button><button class="primary" id="next" type="button">Next</button><button class="yellow" id="submit" type="button" style="display:none">Submit Exam</button></div><div class="result" id="result"></div></div></div></div><script>

ction", "Make up rules based on common sense only", "Ignore the attraction", "Train guests to monitor each other"], 0], ["A guest appears seriously injured on a trampoline. What is your first responsibility?", ["Clear nearby activity and call for help", "Move the guest to the lobby", "Ask guests what happened first", "Keep the attraction open"], 0], ["When should Code Blue be used?", ["For a serious injury or emergency needing immediate leadership response", "Any time a guest asks a question", "For expired wristbands", "When the park gets busy"], 0], ["What information should a walkie call include?", ["Location, type of issue, and support needed", "Only your name", "A long explanation of everything you saw", "Guest opinions about the incident"], 0], ["What should you do with bodily fluids on an attraction?", ["Close the area and call management for biohazard process", "Wipe it with a napkin", "Let guests avoid that spot", "Wait until closing"], 0], ["What should you avoid when giving incident information?", ["Guessing or assigning blame", "Stating the location", "Giving factual details", "Saying who needs help"], 0], ["Why is rubber-necking dangerous?", ["It distracts monitors and guests, increasing the chance of another incident", "It helps solve the first incident", "It makes guests calmer", "It replaces the need for managers"], 0], ["A parent becomes loud and confrontational after an injury. What should you do?", ["Remain calm and call a Manager", "Argue your side", "Walk away without telling anyone", "Ask another guest to intervene"], 0], ["During a utility outage, what should happen to trampoline areas?", ["Guests should be cleared from trampolines", "Guests should keep jumping carefully", "Only older guests should stay on", "The monitor should leave"], 0], ["A suspicious package is found. What should you do?", ["Do not touch it, clear the area, and notify leadership", "Open it to identify the owner", "Move it outside yourself", "Ignore it if it is small"], 0], function shuffle(a){let x=[...a];for(let i=x.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]]}return x}
