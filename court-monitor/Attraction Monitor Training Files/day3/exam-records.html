<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Exam Records</title><style>
:root{--g:#6cc24a;--gd:#4da62d;--y:#f2e600;--b:#0a0a0a;--w:#fff;--muted:#5b6570;--line:#e5eaee;--danger:#dc2626;--blue:#2563eb;--shadow:0 18px 50px rgba(0,0,0,.18);--radius:24px}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top left,rgba(108,194,74,.22),transparent 32%),linear-gradient(135deg,#070707,#171717 52%,#2d341f);color:#111}.btn,.button{border:0;border-radius:999px;padding:12px 18px;font-weight:900;text-decoration:none;display:inline-block;cursor:pointer}.dark{background:#101418;color:#f2e600}.yellow{background:var(--y);color:#000}.back{display:inline-block;color:#fff;text-decoration:none;margin-bottom:18px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);padding:10px 14px;border-radius:999px;font-weight:700}.strip{height:10px;background:linear-gradient(90deg,var(--g),var(--y))}.eyebrow{text-transform:uppercase;letter-spacing:2px;color:var(--gd);font-weight:900;font-size:.78rem}h1,h2,h3{margin:0;color:#101418}p{line-height:1.45}.logo-mark{width:54px;height:54px;border-radius:50%;background:#111;border:3px solid var(--g);display:grid;place-items:center;font-weight:900;color:var(--y);box-shadow:0 0 0 3px rgba(242,230,0,.16)}
body{padding:28px;background:#f4f6f8}.page{max-width:1050px;margin:0 auto;background:#fff;border-radius:18px;border:1px solid var(--line);box-shadow:0 8px 28px rgba(0,0,0,.08);overflow:hidden}header{padding:22px 26px;border-top:10px solid var(--g);border-bottom:1px solid var(--line)}main{padding:22px 26px}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left}th{background:#111820;color:#fff}.actions{display:flex;gap:10px;margin-bottom:18px}.button,button{border:0;border-radius:999px;padding:10px 16px;font-weight:900;text-decoration:none;cursor:pointer}.dark2{background:#111820;color:#fff}.yellow{background:var(--y);color:#000}@media print{.actions{display:none}body{background:#fff}.page{box-shadow:none}}</style>  <style>
    html { display: none; }
    html.portal-authenticated { display: block; }
  </style>
  <script>
    (() => {
      const storageKey = "launchTrainingUnlockedUntil";
      const unlockedUntil = Number(localStorage.getItem(storageKey) || 0);

      if (unlockedUntil <= Date.now()) {
        localStorage.removeItem(storageKey);

        const marker = "/Launch-Training/";
        const currentPath = window.location.pathname;
        const markerPosition = currentPath.indexOf(marker);
        const portalBase = markerPosition >= 0
          ? currentPath.slice(0, markerPosition + marker.length)
          : "/";

        const returnPath =
          currentPath + window.location.search + window.location.hash;

        window.location.replace(
          portalBase + "?return=" + encodeURIComponent(returnPath)
        );
      } else {
        document.documentElement.classList.add("portal-authenticated");
      }
    })();
  </script>
</head><body><div class="page"><header><div class="eyebrow">Launch Attraction Monitor Training</div><h1>Exam Records</h1><p>Records are stored locally on this training computer.</p></header><main><div class="actions"><a class="button dark2" href="./index.html">Back to Day Menu</a><a class="button dark2" href="../../../index.html">Training Portal</a><button class="yellow" onclick="window.print()">Print Records</button><button class="dark2" onclick="clearRecords()">Clear Records</button></div><div id="records"></div></main></div><script>function load(){let r=JSON.parse(localStorage.getItem('courtMonitorExamRecords')||'[]');if(!r.length){records.innerHTML='<p>No exam records saved on this computer yet.</p>';return}records.innerHTML='<table><thead><tr><th>Date</th><th>Employee</th><th>Trainer</th><th>Park</th><th>Day</th><th>Score</th></tr></thead><tbody>'+r.map(x=>`<tr><td>${x.date}</td><td>${x.employee||''}</td><td>${x.trainer||''}</td><td>${x.park||''}</td><td>${x.day}</td><td>${x.score}% (${x.correct}/${x.total})</td></tr>`).join('')+'</tbody></table>'}function clearRecords(){if(confirm('Clear all locally saved Attraction Monitor exam records?')){localStorage.removeItem('courtMonitorExamRecords');load()}}load();</script></body></html>
